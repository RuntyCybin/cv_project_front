services:
  frontend:
    image: nginx:alpine
    container_name: frontend-website
    ports:
      - "8081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./login.html:/usr/share/nginx/html/login.html:ro
      - ./register.html:/usr/share/nginx/html/register.html:ro
      - ./workexpe.html:/usr/share/nginx/html/workexpe.html:ro
      - ./projects.html:/usr/share/nginx/html/projects.html:ro
      - ./skills.html:/usr/share/nginx/html/skills.html:ro
      - ./contact.html:/usr/share/nginx/html/contact.html:ro
      - ./cursos.html:/usr/share/nginx/html/cursos.html:ro
      - ./header.html:/usr/share/nginx/html/header.html:ro
      - ./footer.html:/usr/share/nginx/html/footer.html:ro
      - ./sticky-footer-navbar.css:/usr/share/nginx/html/sticky-footer-navbar.css:ro
      - ./assets:/usr/share/nginx/html/assets:ro
    restart: unless-stopped
