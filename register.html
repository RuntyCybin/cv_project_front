<body class="d-flex flex-column h-100">
  <main class="flex-shrink-0">
    <section class="py-5 text-center container">
      <div class="row py-lg-5">
        <form method="post" action="/register" class="form_registro_usuario">
          <div class="mb-3">
            <label for="registerUsername" class="form-label">Nombre de usuario</label>
            <input type="text" class="form-control" id="registerUsername" placeholder="su_nombre_de_usuario" required>
          </div>
          <div class="mb-3">
            <label for="registerEmail" class="form-label">Email del usuario</label>
            <input type="email" class="form-control" id="registerEmail" aria-describedby="emailHelp"  placeholder="su_email@example.com" required>
            <div id="emailHelp" class="form-text">Nunca compartiremos su email con nadie más.</div>
          </div>
          <div class="mb-3">
            <label for="registerPassword" class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="registerPassword" required>
          </div>
          <div class="mb-3">
            <label for="registerPasswordConfirm" class="form-label">Confirmar Contraseña</label>
            <input type="password" class="form-control" id="registerPasswordConfirm" required>
          </div>

          <div class="mb-3">
            <label for="registerSurname" class="form-label">Apellido del usuario</label>
            <input type="text" class="form-control" id="registerSurname" placeholder="su_apellido" required>
          </div>

          <div class="mb-3">
            <label for="registerBirthday" class="form-label">Fecha de nacimiento</label>
            <input type="date" class="form-control" id="registerBirthday" required>
          </div>

          <div class="mb-3">
            <label for="registerPhone" class="form-label">Telefono del usuario</label>
            <input type="phone" class="form-control" id="registerPhone" placeholder="su_telefono" required>
          </div>

          <div class="mb-3">
            <label for="registerVia" class="form-label">Direccion del usuario - tipo de via</label>
            <input type="text" class="form-control" id="registerVia" placeholder="su_via" required>
          </div>

          <div class="mb-3">
            <label for="registerStr" class="form-label">Direccion del usuario - calle</label>
            <input type="text" class="form-control" id="registerStr" placeholder="su_calle" required>
          </div>

          <div class="mb-3">
            <label for="registerNumber" class="form-label">Direccion del usuario - numero de la casa</label>
            <input type="text" class="form-control" id="registerNumber" placeholder="su_numero" required>
          </div>

          <div class="mb-3">
            <label for="registerPostalCode" class="form-label">Direccion del usuario - codigo postal</label>
            <input type="text" class="form-control" id="registerPostalCode" placeholder="su_codigo_postal" required>
          </div>

          <div class="mb-3">
            <label for="registerCity" class="form-label">Direccion del usuario - ciudad</label>
            <input type="text" class="form-control" id="registerCity" placeholder="su_ciudad" required>
          </div>

          <div class="mb-3">
            <label for="registerProvince" class="form-label">Direccion del usuario - provincia</label>
            <input type="text" class="form-control" id="registerProvince" placeholder="su_provincia" required>
          </div>

          <div class="mb-3">
            <label for="registerCountry" class="form-label">Direccion del usuario - país</label>
            <input type="text" class="form-control" id="registerCountry" placeholder="su_pais" required>
          </div>

          <div class="mb-3">
            <label for="registerNacionalidad" class="form-label">Nacionalidad</label>
            <input type="text" class="form-control" id="registerNacionalidad" placeholder="su_nacionalidad" required>
          </div>

          <button type="submit" class="login_btn">Registrar</button>
          <button type="button" class="login_btn" onclick="window.location.href='/login.html'">Volver</button>
        </form>
      </div>
    </section>
  </main>
  <script src="./assets/js/register.js"></script>
</body>

</html>
